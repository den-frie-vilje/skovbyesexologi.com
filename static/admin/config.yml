# Sveltia CMS configuration for Skovbye Sexologi.
#
# Docs: https://github.com/sveltia/sveltia-cms
#
# ============================================================
# BACKEND — GitHub with self-hosted OAuth proxy
# ============================================================
#
# Sveltia speaks to the GitHub API with an access token. To get
# one without embedding a client secret in the frontend, we run
# an OAuth proxy that trades the OAuth `code` for a token
# server-side. That proxy runs as the `sveltia-auth` container
# on the NAS (see deploy/compose.staging.yml), reachable at
# `https://signe.denfrievilje.dk/auth/*` via the staging Caddy
# front-door.
#
# ----------------------------------------------------------------
# ONE-TIME MANUAL SETUP
# ----------------------------------------------------------------
#
#   1. Register a GitHub OAuth App
#      https://github.com/settings/applications/new
#        Application name: Skovbye Sexologi CMS
#        Homepage URL:     https://skovbyesexologi.com
#        Authorization callback URL:
#          https://skovbyesexologi-com.stage.denfrievilje.dk/auth/callback
#      Copy the generated Client ID + Client Secret.
#
#   2. Bring up the staging compose stack on the NAS with
#      OAUTH_CLIENT_ID + OAUTH_CLIENT_SECRET in deploy/staging.env.
#      The `sveltia-auth` service serves the OAuth handshake at
#      /auth/* behind the Caddy front-door. Full bootstrap in
#      DEPLOY.md.
#
#   3. Comment out the test-repo block below, uncomment the
#      github block, commit, deploy.
#
# Keeping `test-repo` as the shipping default means `/admin` stays
# openable without a running OAuth proxy — test-repo saves never
# leave the browser tab.
#
# ============================================================
# MEDIA
# ============================================================
# Images live under static/img/ and are referenced as /img/<file>
# in rendered HTML. Sveltia uploads land in the media_folder.
#
# ============================================================
# I18N — native Sveltia multiple_folders structure
# ============================================================
# Content layout matches Sveltia's conventions so the editor can
# show both DA and EN in ONE collection with a locale switcher,
# instead of two parallel collections:
#
#   src/content/
#     site.{da,en}.json           ← file collection (the
#     contact.{da,en}.json          {{locale}} placeholder goes in
#     bio.{da,en}.json              the FILENAME)
#     home.{da,en}.json
#     services/
#       {da,en}/*.json            ← folder collection (the locale
#                                    is a SUBFOLDER under the
#                                    collection's `folder:`)
#
# Per-field i18n flags:
#   i18n: true       — translatable (different value per locale)
#   i18n: duplicate  — identical in both locales (structural data,
#                      shared assets, schema identifiers). When
#                      edited in the default locale (DA), the value
#                      auto-syncs to non-default locales.
#   i18n: false      — field lives only in the default locale.
# Collections + groups inherit `i18n: true` down to their fields
# unless a leaf explicitly overrides.
#
# ============================================================
# POSE PALETTE
# ============================================================
# The `options:` arrays for the three stage-pose selects MUST
# stay in sync with `src/lib/stage/poses.ts`. When editing
# poses.ts, also:
#   1. Regenerate SVG thumbnails: `pkgx pnpm icons`
#   2. Update the anchored option lists below.

pose_options_bubble: &pose_options_bubble
  - offstage
  - heroFarRight
  - heroRightBig
  - heroLeftBig
  - upperRightBig
  - centerMax
  - topRightSm
  - topLeftSm
  - bottomLeftSm
  - cornerBLtiny
  - fullBleed

pose_options_drops: &pose_options_drops
  - offstage
  - disperseLowC
  - disperseLowR
  - disperseLowL
  - disperseRightMid
  - topRightMed
  - topLeftSm
  - bottomLeftMed
  - cornerTLtiny
  - cornerBRsm
  - cornerBLsm
  - fullBleed

pose_options_gem: &pose_options_gem
  - offstage
  - heroBRhuge
  - heroRightBig
  - midRightBig
  - cornerBRsm
  - cornerTRsm
  - topRightSm
  - topLeftSm
  - upperRightMed
  - fullBleed

# Editorial-workflow note: Sveltia writes every save to the
# `staging` branch (NOT main). A GH Actions workflow
# (`.github/workflows/deploy-staging.yml`) picks up every push to
# `staging` and rebuilds the staging site within ~2 min. Signe
# reviews there, and when happy clicks "Publish to production"
# at `/publish` on the staging domain — that page merges
# `staging` → `main` via the GitHub API, which triggers
# `deploy-production.yml` and the change lands on
# skovbyesexologi.com shortly after.
#
# This approach replaces Sveltia's native `editorial_workflow`
# feature (which is documented as not-yet-supported for GitHub at
# https://sveltiacms.app/en/docs/workflows/editorial). When that
# feature ships we can reconsider, but the two-branch + /publish
# button gives us the same UX without extra Sveltia dependency.
#
# base_url is the OAuth proxy's root. Sveltia appends /auth and
# /callback, which Caddy strips the /auth prefix from and
# forwards to the sveltia-auth container internally.
backend:
  name: github
  repo: den-frie-vilje/skovbyesexologi.com
  branch: staging
  base_url: https://skovbyesexologi-com.stage.denfrievilje.dk/auth
  site_domain: skovbyesexologi-com.stage.denfrievilje.dk

# Offline / no-auth fallback — uncomment to test the admin UI
# without the OAuth proxy running. Saves never leave the
# browser tab. Useful for pure UI/schema iteration.
#
# backend:
#   name: test-repo

media_folder: static/img
public_folder: /img

i18n:
  structure: multiple_folders
  locales: [da, en]
  default_locale: da

collections:
  # ---- Site metadata ----
  - name: site
    label: Site metadata
    label_singular: Site
    editor: { preview: false }
    i18n: true
    files:
      - name: site
        label: Site metadata
        file: 'src/content/site.{{locale}}.json'
        format: json
        i18n: true
        fields:
          - { name: name, label: Site name, widget: string, i18n: duplicate }
          - name: lang
            label: Language code
            widget: string
            i18n: duplicate
            hint: ISO 639-1 code — must match the locale suffix on the file.
          - { name: tagline, label: Tagline, widget: string }
          - { name: leadIn, label: Lead-in paragraph, widget: text }
          - name: footerCopyright
            label: Footer copyright
            widget: string
            hint: 'Template tokens: {year}, {name}, {cvr}.'

  # ---- Contact info ----
  - name: contact
    label: Contact info
    label_singular: Contact
    editor: { preview: false }
    i18n: true
    files:
      - name: contact
        label: Contact info
        file: 'src/content/contact.{{locale}}.json'
        format: json
        i18n: true
        fields:
          - { name: label, label: Section label, widget: string }
          - { name: heading, widget: string }
          - { name: lede, widget: text }
          - { name: email, widget: string, i18n: duplicate }
          - { name: phone, widget: string, i18n: duplicate }
          - { name: address, widget: string }
          - { name: cvr, label: CVR number, widget: string, i18n: duplicate }
          - { name: hours, label: Opening hours, widget: string }
          - { name: responseTime, label: Response time note, widget: text }
          - name: fieldLabels
            label: Inline field labels (contact card)
            widget: object
            fields:
              - { name: email, widget: string }
              - { name: phone, widget: string }
              - { name: address, widget: string }
              - { name: hours, widget: string }
          - name: socials
            label: Social profiles (optional)
            widget: list
            required: false
            i18n: duplicate
            hint: >-
              Listed in the footer as monochrome icons AND emitted
              in JSON-LD as `sameAs` on the business + person nodes
              (signals entity consolidation to search engines).
              Leave a URL blank to keep the platform on the list
              but hidden. Same URLs across locales — edit in DA
              and EN auto-syncs.
            summary: '{{fields.platform}} · {{fields.url}}'
            fields:
              - name: platform
                widget: select
                options:
                  - { label: LinkedIn, value: linkedin }
                  - { label: Instagram, value: instagram }
                  - { label: Facebook, value: facebook }
                  - { label: Bluesky, value: bluesky }
                  - { label: 'X (Twitter)', value: x }
                  - { label: YouTube, value: youtube }
              - name: url
                widget: string
                required: false
                hint: Full https:// URL to the profile. Blank to hide.

  # ---- Bio ----
  - name: bio
    label: Biography
    label_singular: Bio
    editor: { preview: false }
    i18n: true
    files:
      - name: bio
        label: Bio
        file: 'src/content/bio.{{locale}}.json'
        format: json
        i18n: true
        fields:
          - { name: label, label: Section label, widget: string }
          - { name: heading, widget: string }
          - { name: pronouns, widget: string }
          - { name: portraitAlt, label: Portrait alt text, widget: string }
          - name: body
            label: Body paragraphs
            widget: list
            field: { name: paragraph, widget: text }

  # ---- Home page (includes stage choreography) ----
  - name: home
    label: Home page
    label_singular: Home
    editor: { preview: false }
    i18n: true
    files:
      - name: home
        label: Home
        file: 'src/content/home.{{locale}}.json'
        format: json
        i18n: true
        fields:
          - name: nav
            label: Top-nav links
            widget: list
            fields:
              - { name: label, widget: string }
              - { name: href, widget: string, hint: 'Use #anchor for in-page links.' }

          - name: hero
            widget: object
            fields:
              - { name: name, label: Brand name (hero), widget: string }
              - { name: city, widget: string }
              - { name: statementStart, label: Statement (start), widget: text, hint: 'First line of the three-piece hero statement.' }
              - { name: statementEnd, label: Statement (end before em), widget: text }
              - { name: statementEm, label: Statement (emphasised tail), widget: string }
              - { name: attribution, widget: text, hint: 'Role line under the hero statement.' }
              - { name: scrollLabel, label: Scroll-cue label, widget: string }

          - name: nameSection
            label: 'Who: name + role block'
            widget: object
            fields:
              - { name: eyebrow, widget: string }
              - { name: firstName, widget: string, i18n: duplicate }
              - { name: lastName, widget: string, i18n: duplicate }
              - { name: pronouns, widget: string }
              - { name: roleLine, widget: text }
              - { name: roleSub, widget: text }

          - name: chapter1
            label: Chapter I header (Terapi)
            widget: object
            fields:
              - { name: mark, widget: string, i18n: duplicate, hint: 'Roman numeral marker.' }
              - { name: title, widget: string }
              - { name: lede, widget: text }
          - name: chapter2
            label: Chapter II header (Konsulentydelser)
            widget: object
            fields:
              - { name: mark, widget: string, i18n: duplicate }
              - { name: title, widget: string }
              - { name: lede, widget: text }

          - name: manifest
            label: Manifest (Chapter I)
            widget: object
            fields:
              - { name: label, widget: string }
              - name: items
                widget: list
                fields:
                  - { name: word, widget: string }
                  - { name: text, widget: text }
          - name: ritual
            label: Ritual (Chapter I)
            widget: object
            fields:
              - { name: label, widget: string }
              - { name: subtitle, widget: string }
              - name: steps
                widget: list
                fields:
                  - { name: n, widget: string, i18n: duplicate }
                  - { name: title, widget: string }
                  - { name: body, widget: text }
          - name: forPersonal
            label: 'Kom forbi hvis du — personal'
            widget: object
            fields:
              - { name: label, widget: string }
              - name: items
                widget: list
                field: { name: line, widget: string }

          - { name: pillQuote, label: Pull-quote (intimacy section), widget: text }
          - name: forWork
            label: 'Skriv hvis I — work'
            widget: object
            fields:
              - { name: label, widget: string }
              - name: items
                widget: list
                field: { name: line, widget: string }

          - name: testimonials
            label: Featured testimonials (between bio + contact)
            widget: object
            required: false
            fields:
              - { name: label, label: Section label, widget: string }
              - name: items
                widget: list
                summary: '{{fields.source}}'
                fields:
                  - { name: quote, widget: text }
                  - { name: source, widget: string }

          # Stage choreography is part of the page's STRUCTURE,
          # not its copy — `i18n: duplicate` keeps DA + EN on
          # identical pose sequences so the WebGL scroll
          # choreography stays in lock-step across locales.
          - name: stage
            label: Stage choreography
            widget: object
            i18n: duplicate
            fields:
              - name: sections
                widget: list
                allow_add: false
                collapsed: false
                hint: >-
                  Each entry configures the WebGL stage when its
                  section scrolls into view. IDs must match
                  data-stage-anchor="<id>" attributes in the homepage
                  template — do not add, remove, or rename sections
                  without a developer.
                fields:
                  - { name: id, widget: string }
                  - name: stage
                    widget: object
                    fields:
                      - { name: bubble, widget: select, default: offstage, options: *pose_options_bubble }
                      - { name: drops, widget: select, default: offstage, options: *pose_options_drops }
                      - { name: gem,  widget: select, default: offstage, options: *pose_options_gem  }
                      - { name: intensity, widget: number, value_type: float, min: 0.5, max: 2.0, step: 0.05, default: 1.0 }

  # ---- Services (folder; one file per service × per locale) ----
  #
  # Sveltia's multiple_folders pattern puts the locale as a
  # subfolder of the collection's `folder:` path. Resulting tree:
  #   src/content/services/da/terapi.json
  #   src/content/services/en/terapi.json
  #
  # Filenames are shared across locales (stable cross-locale `id`),
  # so saving a service writes BOTH files with identical basenames.
  # The `slug` field is translatable — it's the per-locale URL
  # segment that appears in /ydelser/{slug} (DA) or
  # /en/services/{slug} (EN).
  - name: services
    label: Services
    label_singular: Service
    folder: src/content/services
    format: json
    extension: json
    create: true
    delete: true
    slug: '{{fields.slug}}'
    identifier_field: title
    editor: { preview: false }
    i18n: true
    fields:
      - name: slug
        widget: string
        hint: 'URL segment — different per locale (e.g. terapi / therapy).'
      - name: number
        widget: string
        i18n: duplicate
        hint: 'Two-digit display number, e.g. "01". Same across locales.'
      - name: chapter
        widget: select
        i18n: duplicate
        default: terapi
        options:
          - { label: 'Chapter I — Terapi (cool bone, iridescent orb)', value: terapi }
          - { label: 'Chapter II — Konsulent (warm bone, chrome orb)', value: konsulent }
        hint: 'Drives palette + homepage grouping. Same across DA + EN.'
      - { name: title, widget: string }
      - { name: kicker, widget: string, hint: 'Short audience line, e.g. "film · tv · teater".' }
      - { name: blurb, widget: text }
      - name: bullets
        label: Feature bullets
        widget: list
        field: { name: bullet, widget: string }
      - { name: supportsLabel, label: Supports list label (optional), widget: string, required: false }
      - name: supports
        label: Supporting keywords (optional)
        widget: list
        required: false
        field: { name: keyword, widget: string }
      - name: testimonials
        label: Testimonials (optional)
        widget: list
        required: false
        summary: '{{fields.source}}'
        fields:
          - { name: quote, widget: text }
          - { name: source, widget: string }
      - name: cta
        label: Call-to-action button (optional)
        widget: object
        required: false
        fields:
          - { name: label, widget: string }
          - { name: href,  widget: string, i18n: duplicate, hint: 'mailto:…, tel:…, or https://…' }
          - name: kind
            widget: select
            i18n: duplicate
            default: primary
            options: [primary, secondary]
      - { name: studiosLabel, label: Studios list label (optional), widget: string, required: false }
      - name: studios
        label: Studio credits (optional)
        widget: list
        required: false
        i18n: duplicate
        hint: 'Black cut-out silhouette SVGs on transparent backgrounds. Shared across locales.'
        fields:
          - { name: name, widget: string }
          - name: logo
            widget: image
            media_folder: /static/img/studios
            public_folder: /img/studios
          - { name: url, widget: string, required: false }
      - name: stage
        label: Detail-page stage pose
        widget: object
        i18n: duplicate
        hint: 'Structural — same across locales.'
        fields:
          - { name: bubble, widget: select, default: offstage, options: *pose_options_bubble }
          - { name: drops, widget: select, default: offstage, options: *pose_options_drops }
          - { name: gem,  widget: select, default: offstage, options: *pose_options_gem  }
          - { name: intensity, widget: number, value_type: float, min: 0.5, max: 2.0, step: 0.05, default: 1.0 }
