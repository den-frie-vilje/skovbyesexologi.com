# Local-dev override for debugging the deploy stack on a laptop.
#
# Usage (from repo root):
#   pkgx pnpm build
#   docker compose \
#     -f deploy/compose.staging.yml \
#     -f deploy/compose.local.yml \
#     up --build
#
# Then open http://localhost:8080.
#
# What this override does vs compose.staging.yml:
#   • `site` builds locally from deploy/Dockerfile (the `image:`
#     key from the staging file still matches the built tag,
#     so nothing is actually pulled from GHCR)
#   • Port binds to 0.0.0.0:8080 so the laptop can reach it
#   • `sveltia-auth` is off (profile gating) — /admin works
#     against `test-repo` backend without OAuth for local work
#   • `restart: no` so Ctrl-C actually kills everything
#   • `skovbye-deploy` network is created locally, not external

name: skovbyesexologi-local

networks:
  skovbye-deploy:
    external: false

services:
  caddy:
    # `!override` replaces the parent file's ports list instead
    # of merging it. Without this, compose would concatenate —
    # trying to bind both `127.0.0.1:8080:80` (staging.yml) and
    # `0.0.0.0:8080:80` (this file), which fails with
    # "address already in use" because the second bind collides
    # with the first. `!override` needs Compose 2.24+.
    ports: !override
      - "8080:80"
    restart: "no"

  site:
    # Build locally. The `image:` tag from compose.staging.yml
    # is what the local build is tagged as — Docker won't try
    # to pull it from GHCR because the local build wins.
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    pull_policy: build
    restart: "no"

  # sveltia-auth: profile gating keeps it off in local dev.
  # The `never` profile is not activated by any --profile flag,
  # so compose skips the service. Caddy's /auth/* route will
  # 502 — expected, we're not testing OAuth locally.
  sveltia-auth:
    profiles: [never]
