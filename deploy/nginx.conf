# Serves the prerendered SvelteKit site.
#
# `adapter-static` produces a fully static tree (every route is an
# `index.html` under its route path), so there's no SPA fallback —
# missing paths are real 404s, not client-side router catches.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived immutable caching for hashed static assets.
    # SvelteKit emits `_app/immutable/*` with content-hashed
    # filenames, so a year is safe — a redeploy produces new
    # filenames and the old ones get harmlessly replaced.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Media + fonts: long cache with revalidation. Filenames
    # aren't content-hashed here, so we accept a week and let
    # clients revalidate after that.
    location ~* \.(jpg|jpeg|png|webp|avif|gif|ico|svg|woff2?|eot|ttf|otf)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # HTML: no-cache so the redeploy is visible on next
    # navigation without users having to hard-refresh. The
    # content itself is tiny (<10 KB gzipped per page) so this
    # doesn't hurt bandwidth meaningfully.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Pretty-URL handling: `/foo` → `/foo.html` or
    # `/foo/index.html`. Adapter-static produces both shapes
    # depending on the route's trailing-slash setting, so try
    # both before returning 404.
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Custom 404 uses the prerendered /404 route when available,
    # falls back to nginx's minimal default otherwise.
    error_page 404 /404.html;

    # Compression. Both static pre-gzip (if present) and runtime.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Minimal access log on stdout (Docker picks it up).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
