# Serves the prerendered SvelteKit site.
#
# `adapter-static` produces a fully static tree (every route is an
# `index.html` under its route path), so there's no SPA fallback —
# missing paths are real 404s, not client-side router catches.

server {
    # Port 8080 — the site container runs as the unprivileged
    # `nginx` user (UID 101), which can't bind to <1024. Caddy's
    # reverse_proxy upstream is `site:8080` to match.
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived immutable caching for hashed static assets.
    # SvelteKit emits `_app/immutable/*` with content-hashed
    # filenames, so a year is safe — a redeploy produces new
    # filenames and the old ones get harmlessly replaced.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Media + fonts: long cache with revalidation. Filenames
    # aren't content-hashed here, so we accept a week and let
    # clients revalidate after that.
    location ~* \.(jpg|jpeg|png|webp|avif|gif|ico|svg|woff2?|eot|ttf|otf)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # HTML: no-cache so the redeploy is visible on next
    # navigation without users having to hard-refresh. The
    # content itself is tiny (<10 KB gzipped per page) so this
    # doesn't hurt bandwidth meaningfully.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Pretty-URL handling: `/foo` → `/foo.html` or
    # `/foo/index.html`. Adapter-static produces both shapes
    # depending on the route's trailing-slash setting.
    #
    # Final fallthrough is /200.html — the SvelteKit SPA shell
    # generated by adapter-static's `fallback` option. It's
    # served for routes that intentionally opt out of prerender
    # (currently /publish, a client-side interactive page). The
    # SvelteKit router then hydrates and renders the actual
    # route client-side.
    #
    # This means real 404s (non-existent paths) also serve the
    # shell and get handled client-side with a 200 status code
    # instead of 404. Standard SPA trade-off — acceptable here
    # because the 404 page has noindex meta + the site itself
    # is small enough that stale links are rare.
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html /200.html;
    }

    # Compression. Both static pre-gzip (if present) and runtime.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Minimal access log on stdout (Docker picks it up).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
