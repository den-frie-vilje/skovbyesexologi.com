# Hook definitions for the deploy webhook — one shared container
# serving every site on the NAS. New sites append two entries,
# one per environment, following the skovbyesexologi.com block
# below as a template.
#
# Conventions:
#   id path              /deploy/<domain>/<env>
#   script               /scripts/deploy.sh
#   script args          <domain> <env>     (both static, never
#                                            from the request body)
#   HMAC secret env var  <DOMAIN_SAFE>_<ENV>_WEBHOOK_SECRET
#                        (DOMAIN_SAFE = upper, dots→underscores)
#
# Public URLs GH Actions POSTs to:
#   https://<domain>.stage.denfrievilje.dk/hooks/deploy/<domain>/staging
#   https://<domain>.prod.denfrievilje.dk/hooks/deploy/<domain>/production
#
# `-hotreload` on the webhook command means edits to this file
# are picked up live — no container restart needed.

# ----------------------------------------------------------------
# skovbyesexologi.com
# ----------------------------------------------------------------

- id: deploy/skovbyesexologi.com/staging
  execute-command: /scripts/deploy.sh
  command-working-directory: /scripts
  pass-arguments-to-command:
    - source: string
      name: skovbyesexologi.com
    - source: string
      name: staging
  response-message: "skovbyesexologi.com staging deploy triggered."
  trigger-rule:
    match:
      type: payload-hmac-sha256
      secret: "{{ getenv `SKOVBYESEXOLOGI_COM_STAGING_WEBHOOK_SECRET` }}"
      parameter:
        source: header
        name: X-Hub-Signature-256

- id: deploy/skovbyesexologi.com/production
  execute-command: /scripts/deploy.sh
  command-working-directory: /scripts
  pass-arguments-to-command:
    - source: string
      name: skovbyesexologi.com
    - source: string
      name: production
  response-message: "skovbyesexologi.com production deploy triggered."
  trigger-rule:
    match:
      type: payload-hmac-sha256
      secret: "{{ getenv `SKOVBYESEXOLOGI_COM_PRODUCTION_WEBHOOK_SECRET` }}"
      parameter:
        source: header
        name: X-Hub-Signature-256
