# Containerised acme.sh for wildcard Let's Encrypt certs.
#
# Does two jobs for every site on the NAS:
#   1. Issue wildcard certs (DNS-01 challenge) for
#      *.stage.denfrievilje.dk and *.prod.denfrievilje.dk
#      — DSM's built-in LE only supports HTTP-01 and can't
#      issue wildcards, so this fills that gap
#   2. Renew them automatically (internal crond runs nightly)
#      and push each renewal into DSM's cert store via the
#      synology_dsm deploy hook — so DSM's Certificate UI stays
#      the single source of truth for cert↔vhost bindings
#
# Lifecycle: bootstrapped ONCE per NAS, updated manually
# (`docker compose pull && up -d` by hand) — same treatment
# as the webhook container, for the same chicken-and-egg
# reason. A broken acme upgrade shouldn't lock us out of cert
# renewal.
#
# The container is orthogonal to per-site deploys: it runs
# continuously, independent of any site's deploy pipeline,
# and only touches certs + DSM's cert store. Sites bind the
# issued wildcards to their vhosts via the normal DSM UI.

name: acme-sh

services:
  acme:
    image: neilpang/acme.sh:latest
    container_name: acme.sh
    restart: unless-stopped

    # Host networking lets the container reach DSM's WebAPI at
    # http://localhost:5000 for the synology_dsm deploy hook
    # without fighting DSM's firewall over docker-bridge
    # routing. acme.sh's daemon doesn't bind any listening
    # ports of its own, so there's no collision risk.
    #
    # Tighter alternative (if you'd rather not use host mode):
    #   network_mode: bridge
    #   extra_hosts:
    #     - "host.docker.internal:host-gateway"
    # and set SYNO_Hostname=host.docker.internal in acme.env.
    # Works on modern Docker (20.10+) but requires the DSM
    # firewall to permit traffic from the docker bridge.
    network_mode: host

    volumes:
      # Persistent cert store + acme.sh config. Bind mount
      # (not named volume) so the dir is easy to back up + the
      # NAS admin can inspect issued certs via File Station.
      - ./data:/acme.sh

    env_file:
      - ./acme.env

    # `daemon` = acme.sh's own entrypoint mode that runs crond
    # inside the container. Renews every cert within 30 days of
    # expiry, then re-runs each cert's deploy hook to push the
    # renewed version into DSM. Nightly at 00:00 container-local.
    command: daemon
