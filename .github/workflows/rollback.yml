# Manual rollback — retag an older immutable image as
# `<env>-latest` at the GHCR manifest level and POST the deploy
# webhook. Delegates to the reusable workflow in nas-sites.
#
# Usage: GitHub UI → Actions → Rollback → Run workflow.
# List recent tags from the laptop:
#   gh api /users/den-frie-vilje/packages/container/skovbyesexologi/versions \
#     --jq '.[].metadata.container.tags[]' \
#   | sort -u | head -40

name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        options: [staging, production]
      image_tag:
        description: 'Full immutable tag to roll back TO (e.g. production-2026-04-23T14-02-19Z-abc12345)'
        type: string
        required: true

jobs:
  derive-webhook-url:
    # Select the right webhook URL based on the environment
    # input so the reusable rollback workflow stays generic.
    runs-on: ubuntu-latest
    outputs:
      webhook-url: ${{ steps.pick.outputs.url }}
    steps:
      - id: pick
        run: |
          case "${{ inputs.environment }}" in
            staging)
              echo "url=https://skovbyesexologi-com.stage.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/staging" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "url=https://skovbyesexologi-com.prod.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/production" >> "$GITHUB_OUTPUT"
              ;;
          esac

  rollback:
    needs: derive-webhook-url
    uses: den-frie-vilje/nas-sites/.github/workflows/rollback.yml@main
    with:
      environment: ${{ inputs.environment }}
      image-name: ghcr.io/den-frie-vilje/skovbyesexologi
      image-tag: ${{ inputs.image_tag }}
      webhook-url: ${{ needs.derive-webhook-url.outputs.webhook-url }}
    secrets:
      WEBHOOK_SECRET: ${{ inputs.environment == 'staging' && secrets.STAGING_WEBHOOK_SECRET || secrets.PRODUCTION_WEBHOOK_SECRET }}
