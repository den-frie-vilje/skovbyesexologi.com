# Rollback workflow — retag an older GHCR image as the env's
# `-latest` pointer, then POST the deploy webhook so the NAS
# picks up the change immediately.
#
# Usage: GitHub UI → Actions → Rollback → Run workflow. Pick
# the environment and paste the full immutable tag string
# (e.g. `staging-2026-04-23T14-02-19Z-abc12345`) visible in
# the original deploy run's summary.
#
# Listing available tags from your laptop:
#   gh api /users/den-frie-vilje/packages/container/skovbyesexologi/versions \
#     --jq '.[].metadata.container.tags[]' \
#   | sort -u | head -40
#
# Operates purely at the registry manifest layer — no pull/push
# of image layers — because `buildx imagetools create --tag`
# just updates the manifest pointer.

name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        options:
          - staging
          - production
      image_tag:
        description: 'Full immutable tag to roll back TO (e.g. staging-2026-04-23T14-02-19Z-abc12345)'
        type: string
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/den-frie-vilje/skovbyesexologi
    steps:
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate source tag exists
        # Fail fast if the user pasted a tag that's not in GHCR —
        # otherwise imagetools would create a broken manifest
        # pointer and the NAS pull would fail mid-deploy.
        run: docker buildx imagetools inspect "$IMAGE:${{ inputs.image_tag }}"

      - name: Retag <env>-latest → the chosen immutable tag
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:${{ inputs.environment }}-latest" \
            "$IMAGE:${{ inputs.image_tag }}"

      - name: Derive webhook URL + secret
        id: wh
        run: |
          case "${{ inputs.environment }}" in
            staging)
              echo "url=https://skovbyesexologi-com.stage.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/staging" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "url=https://skovbyesexologi-com.prod.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/production" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Trigger NAS deploy webhook
        env:
          SECRET: ${{ inputs.environment == 'staging' && secrets.STAGING_WEBHOOK_SECRET || secrets.PRODUCTION_WEBHOOK_SECRET }}
          URL: ${{ steps.wh.outputs.url }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          BODY=$(jq -cn \
            --arg tag "$IMAGE_TAG" \
            --arg run "$RUN_URL" \
            '{image_tag: $tag, run_url: $run, rollback: true}')

          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $2}')"

          HTTP_CODE=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            --data "$BODY" \
            --max-time 180 \
            --retry 3 --retry-delay 5 --retry-connrefused)

          echo "webhook HTTP $HTTP_CODE"
          cat /tmp/resp.txt || true
          [ "$HTTP_CODE" = "200" ] || exit 1

      - name: Summary
        run: |
          {
            echo "## Rolled back"
            echo ""
            echo "- Environment: **${{ inputs.environment }}**"
            echo "- \`${{ inputs.environment }}-latest\` now points at: \`${{ inputs.image_tag }}\`"
            echo ""
            echo "The NAS has been notified — the old release should be live in ~30s."
          } >> "$GITHUB_STEP_SUMMARY"
