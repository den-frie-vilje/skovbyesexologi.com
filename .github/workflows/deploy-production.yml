# Trigger: push to `main`. Fires via Signe's /publish page
# (which does a GitHub API merge of staging → main) or via a
# normal PR merge on the developer side.
#
# Three-stage gating:
#
#   1. detect-changes — diffs HEAD against its parent. If every
#      changed file is a content-only path (Sveltia editor
#      output: src/content/** + static/img/**), bypass the
#      signature check AND the reviewer gate. Anything outside
#      those paths — code, CSS, deploy config, workflows, the
#      admin loader — requires both signed commits AND explicit
#      reviewer approval.
#
#   2. verify-signatures — only runs when content-only=false.
#      Cryptographically verifies that every commit being
#      introduced to main (between this push's `before` and
#      `after` SHAs) is signed by a trusted key recognized by
#      GitHub. Catches the case where someone with stolen
#      credentials pushes code commits but lacks the signing
#      key. Trusts GitHub's verification — passes for
#      developer hand-signed commits AND for GitHub web-flow
#      signed merge commits, blocks anything `verified: false`
#      (unsigned, bad signature, unknown key, etc).
#
#   3. approve — only runs when content-only=false AND
#      verify-signatures passed. References the `production-gate`
#      GitHub environment, which has the required-reviewer rule
#      (Ole) configured in repo Settings → Environments. Times
#      out after 2 days; if not approved the workflow auto-fails
#      and a re-deploy needs a fresh Actions UI rerun.
#
#   4. deploy — the actual build + push + webhook trigger. Runs
#      after approval for code changes; runs immediately for
#      content-only pushes (which skipped both verify-signatures
#      and approve). References the `production` environment for
#      secret scope (PRODUCTION_WEBHOOK_SECRET); that env should
#      NOT have a reviewer rule — the gate is the responsibility
#      of `production-gate` upstream.
#
# One-time setup before the first run with this file on main:
#   • Create `production-gate` env (Settings → Environments)
#   • Add Ole as a required reviewer there
#   • Confirm `production` env has the secret but NO reviewers

name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      multiarch:
        description: 'Also build linux/arm64 (slow — adds ~3min QEMU emulation). Default amd64-only matches the NAS.'
        type: boolean
        default: false

jobs:
  detect-changes:
    # Decides whether this push is content-only (Signe's Sveltia
    # commits) or contains code/config changes that warrant
    # human review before deploy. workflow_dispatch always
    # routes through the reviewer gate (no diff to check).
    runs-on: ubuntu-latest
    outputs:
      # 'true' → bypass reviewer gate. 'false' (or empty,
      # treated as false) → require approval.
      content-only: ${{ steps.filter.outputs.content-only || 'false' }}
    steps:
      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          # Need parent commit on main for the diff. fetch-depth: 2
          # gets HEAD + parent — enough for paths-filter, much
          # cheaper than fetching the full history.
          fetch-depth: 2

      - name: Detect content-only push
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          # `every`: every changed file must match at least one
          # of the listed patterns. A single file outside these
          # paths flips content-only to false.
          predicate-quantifier: 'every'
          filters: |
            content-only:
              - 'src/content/**'
              - 'static/img/**'

      - name: Summarise routing
        run: |
          if [ "${{ steps.filter.outputs.content-only || 'false' }}" = "true" ]; then
            echo "content-only push — skipping reviewer gate" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "code/config change detected — reviewer approval required" >> "$GITHUB_STEP_SUMMARY"
          fi

  verify-signatures:
    # Cryptographic gate. Skipped for content-only pushes
    # (Sveltia saves are unsigned by design — OAuth API commits
    # don't trigger GitHub's web-flow signing, and the path
    # filter has already isolated those into the bypass branch).
    # For any push that touches code/config: every introduced
    # commit must be `verified: true` per GitHub's verification
    # check. This catches credential-theft attacks where the
    # attacker has token access but no signing key.
    needs: detect-changes
    if: needs.detect-changes.outputs.content-only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify all introduced commits are GitHub-verified
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Range to verify:
          #   push event   → commits between event.before..event.after
          #   workflow_dispatch / weird events → just HEAD (1 commit)
          if [ "$EVENT" = "push" ] && [ -n "$BEFORE" ] && \
             [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            BASE="$BEFORE"
            HEAD="$AFTER"
          else
            BASE="${AFTER}~1"
            HEAD="$AFTER"
          fi

          echo "Verifying commits in $BASE..$HEAD"

          # Single API call. `compare` returns the commit list
          # with each commit's verification block populated.
          UNVERIFIED=$(gh api "repos/$REPO/compare/$BASE...$HEAD" \
            --jq '.commits[] | select(.commit.verification.verified == false) | "\(.sha[0:7]) [\(.commit.verification.reason)] \(.commit.message | split("\n")[0])"')

          TOTAL=$(gh api "repos/$REPO/compare/$BASE...$HEAD" --jq '.commits | length')

          if [ -n "$UNVERIFIED" ]; then
            echo "::error::$(echo "$UNVERIFIED" | wc -l | tr -d ' ') of $TOTAL introduced commit(s) lack a trusted signature:"
            echo "$UNVERIFIED" | while IFS= read -r line; do
              echo "::error::  $line"
            done
            echo ""
            echo "Phase 3 policy: code/config changes must be signed by a key registered with the committer's GitHub account."
            echo "Hand commits: configure local git signing — see docs/PHASE-3-SIGNED-COMMITS.md if added."
            echo "Merge commits: GitHub's web-flow auto-signs PR merges and squash-merges; if you see this on a merge commit, the underlying commits were the unsigned ones."
            exit 1
          fi

          echo "✓ All $TOTAL introduced commit(s) verified by GitHub"
          {
            echo "## Signature verification"
            echo ""
            echo "All $TOTAL commit(s) introduced in this push are signed by trusted keys."
          } >> "$GITHUB_STEP_SUMMARY"

  approve:
    # Reviewer gate. Skipped entirely for content-only pushes;
    # required-reviewer prompt fires for anything else. The
    # `production-gate` environment must have Ole listed as a
    # required reviewer in repo Settings → Environments.
    needs: [detect-changes, verify-signatures]
    if: needs.detect-changes.outputs.content-only != 'true'
    runs-on: ubuntu-latest
    environment: production-gate
    timeout-minutes: 2880  # 2 days — workflow auto-fails if Ole hasn't approved
    steps:
      - name: Reviewed
        run: echo "Code/config change reviewed and approved — proceeding to build + deploy."

  deploy:
    # Build, push, fire webhook, smoke-check. Runs after approval
    # for code changes; runs immediately for content-only pushes.
    needs: [detect-changes, verify-signatures, approve]
    # `always()` lets us evaluate this `if:` even when
    # verify-signatures and approve were skipped (content-only).
    # For non-content-only, both must have succeeded. The OR
    # branch handles the content-only short-circuit.
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.detect-changes.outputs.content-only == 'true' ||
       (needs.verify-signatures.result == 'success' &&
        needs.approve.result == 'success'))
    uses: den-frie-vilje/nas-sites/.github/workflows/build-and-notify.yml@main
    with:
      environment: production
      dockerfile: deploy/Dockerfile
      image-name: ghcr.io/den-frie-vilje/skovbyesexologi
      platforms: ${{ inputs.multiarch && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
      build-args: |
        VITE_MODE=production
        PUBLIC_GIT_SHA=${{ github.sha }}
        PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
      webhook-url: https://skovbyesexologi-com.prod.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/production
      # Smoke check against the client-facing apex — that's the
      # URL real users hit, not the internal .prod.* origin.
      smoke-check-url: https://skovbyesexologi.com/
    secrets:
      WEBHOOK_SECRET: ${{ secrets.PRODUCTION_WEBHOOK_SECRET }}
