# Trigger: push to `main`. Fires via Signe's /publish page
# (which does a GitHub API merge of staging → main) or via a
# normal PR merge on the developer side.
#
# Gatable: enable required reviewers on the `production`
# environment (repo Settings → Environments) to require
# manual approval before the webhook fires.

name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: den-frie-vilje/nas-sites/.github/workflows/build-and-notify.yml@main
    with:
      environment: production
      dockerfile: deploy/Dockerfile
      image-name: ghcr.io/den-frie-vilje/skovbyesexologi
      build-args: |
        VITE_MODE=production
        PUBLIC_GIT_SHA=${{ github.sha }}
        PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
      webhook-url: https://skovbyesexologi-com.prod.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/production
      # Smoke check against the client-facing apex — that's the
      # URL real users hit, not the internal .prod.* origin.
      smoke-check-url: https://skovbyesexologi.com/
    secrets:
      WEBHOOK_SECRET: ${{ secrets.PRODUCTION_WEBHOOK_SECRET }}
