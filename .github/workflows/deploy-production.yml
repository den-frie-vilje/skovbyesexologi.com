# Trigger: push to `main`. Happens when Signe clicks "Publish"
# on /publish (staging → main merge via API) or when a PR lands
# on main via normal dev flow.
#
# Gatable: enable required reviewers on the `production`
# environment (Settings → Environments) to require manual
# approval before the webhook fires.
#
# Webhook URL targets the canonical NAS origin
# (skovbyesexologi.com.prod.denfrievilje.dk), NOT the client
# domain (skovbyesexologi.com). The client domain CNAMEs to
# the origin and can be reconfigured freely without touching
# the deploy pipeline.
#
# Path includes the full domain so the shared webhook container
# on the NAS can disambiguate multiple sites. HMAC secret is
# per-(site, env) — SKOVBYESEXOLOGI_COM_PRODUCTION_WEBHOOK_SECRET
# on the NAS, PRODUCTION_WEBHOOK_SECRET on this repo.
#
# Smoke-check URL, however, targets the client-facing domain —
# that's what real users see, and what we want to confirm is
# actually responding after a deploy.

name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/build-and-notify.yml
    with:
      environment: production
      image-name: ghcr.io/den-frie-vilje/skovbyesexologi
      webhook-url: https://skovbyesexologi.com.prod.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/production
      smoke-check-url: https://skovbyesexologi.com/
    secrets:
      WEBHOOK_SECRET: ${{ secrets.PRODUCTION_WEBHOOK_SECRET }}
