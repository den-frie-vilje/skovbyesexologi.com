# Trigger: push to the `staging` branch. That's the branch Sveltia
# writes to when the editor saves, so this workflow fires after
# every save in /admin. Typical end-to-end latency: ~2 min from
# save to staging being live at signe.denfrievilje.dk.
#
# Can also be kicked manually (workflow_dispatch) if something
# needs a redeploy without a new commit.

name: Deploy to staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    # `secrets: inherit` passes through all repo-level secrets AND
    # the `staging` GH Actions environment's secrets, which is
    # where DEPLOY_PATH should be scoped per-environment.
    secrets: inherit
