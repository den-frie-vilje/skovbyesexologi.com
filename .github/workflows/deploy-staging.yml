# Trigger: push to the `staging` branch (Sveltia auto-commits
# here on every editor save) or manual workflow_dispatch.
#
# Build + push + Sigstore Cosign sign happens in the reusable
# workflow in den-frie-vilje/nas-sites. CI does NOT call the NAS —
# the NAS-side pull-only agent verifies the signature and deploys
# on its own schedule (within ~5 min of the push).

name: Deploy to staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      multiarch:
        description: 'Also build linux/arm64 (slow — adds ~3min QEMU emulation). Default amd64-only matches the NAS. Tick for M-series Mac local debugging.'
        type: boolean
        default: false

jobs:
  deploy:
    uses: den-frie-vilje/nas-sites/.github/workflows/build-and-sign.yml@main
    with:
      environment: staging
      dockerfile: deploy/Dockerfile
      image-name: ghcr.io/den-frie-vilje/skovbyesexologi
      platforms: ${{ inputs.multiarch && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
      # Vite bakes these into the client bundle at build time so
      # the site footer can show "build <sha> · <date>" linked
      # back to the commit. PUBLIC_GIT_SHA also doubles as the
      # verify-pattern source — the post-sign poll greps the
      # rendered footer for the new SHA.
      build-args: |
        VITE_MODE=staging
        PUBLIC_GIT_SHA=${{ github.sha }}
        PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
      # Origin URL (not CF apex) so the verify poll bypasses any
      # CDN caching. Returns the new commit SHA in the footer
      # markup once the agent's deploy lands.
      verify-url: https://skovbyesexologi-com.stage.denfrievilje.dk/
