# Trigger: push to the `staging` branch (Sveltia auto-commits
# here on every editor save) or manual workflow_dispatch.
#
# All heavy lifting — docker buildx build, paranoia scan,
# HMAC webhook POST, smoke-check — lives in the reusable
# workflow in den-frie-vilje/nas-sites. This file is the thin
# per-site caller that wires in site-specific identifiers.

name: Deploy to staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    uses: den-frie-vilje/nas-sites/.github/workflows/build-and-notify.yml@main
    with:
      environment: staging
      dockerfile: deploy/Dockerfile
      image-name: ghcr.io/den-frie-vilje/skovbyesexologi
      # Vite bakes these into the client bundle at build time so
      # the site footer can show "build <sha> · <date>" linked
      # back to the commit. VITE_MODE selects .env.staging.
      build-args: |
        VITE_MODE=staging
        PUBLIC_GIT_SHA=${{ github.sha }}
        PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
      webhook-url: https://skovbyesexologi-com.stage.denfrievilje.dk/hooks/deploy/skovbyesexologi.com/staging
      smoke-check-url: https://skovbyesexologi-com.stage.denfrievilje.dk/
    secrets:
      WEBHOOK_SECRET: ${{ secrets.STAGING_WEBHOOK_SECRET }}
