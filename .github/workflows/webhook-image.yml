# Build + push the shared deploy-webhook image.
#
# The webhook container (adnanh/webhook + docker-cli + git +
# curl) is installed ONCE per NAS, not once per site. We build
# it in CI and push to GHCR rather than building on the NAS
# because Synology's kernel ships without seccomp support, which
# breaks any `RUN` step during a build.
#
# Triggers:
#   • push to main/deployment-pull-model with changes under
#     deploy/webhook/** (the image build context)
#   • manual workflow_dispatch for ad-hoc rebuilds
#
# Only one tag: `webhook-latest`. The image changes rarely (it's
# a utility container, not versioned alongside site code), and
# rollback isn't really meaningful — you just rebuild.

name: Build webhook image

on:
  push:
    branches: [main, deployment-pull-model]
    paths:
      - 'deploy/webhook/**'
      - '.github/workflows/webhook-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./deploy/webhook
          push: true
          tags: ghcr.io/den-frie-vilje/skovbyesexologi-webhook:latest
          cache-from: type=registry,ref=ghcr.io/den-frie-vilje/skovbyesexologi-webhook:latest
          cache-to: type=inline

      - name: Summary
        run: |
          {
            echo "## Webhook image pushed"
            echo ""
            echo "- \`ghcr.io/den-frie-vilje/skovbyesexologi-webhook:latest\`"
            echo ""
            echo "NAS pulls this at webhook-bootstrap time. After the first"
            echo "successful push, ensure the GHCR package visibility is"
            echo "Public — otherwise the NAS needs a PAT to pull."
          } >> "$GITHUB_STEP_SUMMARY"
