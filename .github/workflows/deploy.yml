# Reusable deploy workflow — called by `deploy-staging.yml` and
# `deploy-production.yml`. Not triggered directly (no `on: push`).
#
# Pipeline:
#   1. checkout + install deps (pkgx-managed pnpm, Node 25 floor)
#   2. type-check (fails fast before we burn the build minutes)
#   3. `vite build --mode <environment>` — picks up .env.<mode>
#   4. connect the GH runner to the tailnet with an OAuth-minted
#      ephemeral node (dies with the job, no credential reuse)
#   5. install the deploy SSH key
#   6. rsync build/ → NAS `<base>/releases/<timestamp>-<sha8>/`
#   7. atomic symlink flip: `<base>/current` → the new release
#   8. prune old releases (keep the last 5 for rollback)
#
# Reusability: the same file is the copy-paste target for
# `olekristensen/website` and `denfrievilje.dk`. The only
# per-repo knobs are the GH Actions secrets listed below — no
# hardcoded domain or path in this file.

name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment — staging or production. Used as the GH Actions environment name (for env-scoped secrets + approvals) AND as the Vite build mode.'
        required: true
        type: string
    secrets:
      TS_OAUTH_CLIENT_ID:
        description: 'Tailscale OAuth client ID. Used by tailscale/github-action to mint an ephemeral auth key for this run.'
        required: true
      TS_OAUTH_SECRET:
        description: 'Tailscale OAuth client secret.'
        required: true
      DEPLOY_SSH_KEY:
        description: 'SSH private key (ed25519 recommended) for the `deploy` user on the NAS. Paste the full PEM including the BEGIN/END lines.'
        required: true
      DEPLOY_HOST:
        description: 'NAS hostname reachable over the tailnet — e.g. server.denfrievilje.ts.net.'
        required: true
      DEPLOY_USER:
        description: 'SSH user on the NAS. Typically `deploy`.'
        required: true
      DEPLOY_PATH:
        description: 'Filesystem base path for THIS environment on the NAS — e.g. /volume1/web/skovbyesexologi.com. Contains releases/ and current → releases/<id>.'
        required: true

# Don't cancel a deploy in progress for the same environment —
# finishing a half-done rsync + symlink flip beats aborting mid-
# transfer with an inconsistent `releases/<id>` on disk.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pkgx
        # pkgx owns all runtime versions (Node 25, pnpm) per
        # `pkgx.yml` + `package.json engines`. Installing it once
        # here replaces separate `actions/setup-node` +
        # `pnpm/action-setup` steps.
        run: curl -fsSL https://pkgx.sh | sh

      - name: Install dependencies
        run: pkgx pnpm install --frozen-lockfile

      - name: Type check
        run: pkgx pnpm check

      - name: Build
        # `vite build --mode <environment>` picks up .env.<mode>
        # from the repo root. PUBLIC_SITE_URL +
        # PUBLIC_ALLOW_INDEXING + PUBLIC_GITHUB_REPO all flow
        # through from there.
        run: pkgx pnpm build -- --mode ${{ inputs.environment }}

      - name: Connect to tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          # ACL tag on the tailnet side restricts what this
          # ephemeral node can reach — see DEPLOY.md for the tag
          # + ACL config on the Tailscale admin console.
          tags: tag:ci

      - name: Install deploy SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          # Capture the NAS's host key via SSH over the tailnet so
          # we don't leak the fingerprint to the public internet
          # and future runs keep a consistent trust anchor.
          ssh-keyscan -T 10 -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy release
        id: deploy
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          BASE: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          # ISO-8601 timestamp + short SHA so every release dir
          # is uniquely identifiable AND trivially sortable.
          RELEASE_ID="$(date -u +'%Y-%m-%dT%H-%M-%SZ')-${GITHUB_SHA::8}"
          echo "release-id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

          RELEASE_PATH="$BASE/releases/$RELEASE_ID"
          CURRENT_LINK="$BASE/current"

          SSH="ssh -i $HOME/.ssh/deploy -o BatchMode=yes"

          # Stage the release in a new dir first, so if rsync
          # fails the live site isn't affected.
          $SSH "$USER@$HOST" "mkdir -p '$RELEASE_PATH'"

          rsync -az --delete \
            --rsh="ssh -i $HOME/.ssh/deploy -o BatchMode=yes" \
            ./build/ "$USER@$HOST:$RELEASE_PATH/"

          # Atomic flip + prune old releases (keep the 5 most
          # recent for rollback). Single ssh round-trip so if
          # the flip succeeds and the prune fails, we still have
          # a good `current`; if the flip fails, no prune runs.
          $SSH "$USER@$HOST" bash -s <<EOF
          set -euo pipefail
          cd '$BASE'
          ln -sfn 'releases/$RELEASE_ID' current.new
          mv -Tf current.new current
          cd releases
          ls -1t | tail -n +6 | xargs -I {} rm -rf -- '{}'
          EOF

      - name: Summary
        run: |
          {
            echo "## Deployed"
            echo ""
            echo "- Environment: **${{ inputs.environment }}**"
            echo "- Release ID: \`${{ steps.deploy.outputs.release-id }}\`"
            echo "- Commit: \`${GITHUB_SHA::8}\`"
            echo ""
            echo "Rollback this environment to a previous release via the \"Rollback\" workflow."
          } >> "$GITHUB_STEP_SUMMARY"
